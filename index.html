<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGA FONT EDITOR ONLINE</title>
    <link rel="shortcut icon" href="imgs/icon.svg">
</head>

<link rel="stylesheet" type="text/css" href="styles/styles.css">

<body>
    <input type="file" id="OpenFontInput" style="display: none;" />
    <div class="menuBar">
        <button class="menuButton" onclick="resetCharsData(16)" id="new16Button"></button>
        <button class="menuButton" onclick="resetCharsData(8)" id="new8Button"></button>
        <button class="menuButton" onclick="openFont()" id="openButton"></button>
        <button class="menuButton" onclick="saveFont()" id="saveButton"></button>
        <!-- <button class="menuButton" onclick="debug()">Debug</button> -->
        <div id="warningArea"></div>
    </div>

    <div class="editor">
        <div class="charArea" id="charArea">
            <div class="goto" id="goto">
                <button class="menuButton" onclick="gotoInputStart()">
                    <span id="gotoButtonText"></span>
                    <span id="gotoInput"></span>
                </button>
            </div>
            <div class="charButtonArea" id="charButtonArea"></div>
        </div>

        <div class="canvasArea">
            <div class="charTitle" id="charTitle"></div>

            <div class="canvarsAndHelp">
                <div class="pixelCanvas" id="pixelCanvas"></div>
            </div>
        </div>
    </div>
</body>

<script src="scripts/charDescriptions.js"></script>
<script src="scripts/script.js"></script>
<script src="scripts/i18n.js"></script>
<script src="scripts/init.js"></script>
<script src="scripts/keyboardShortcut.js"></script>

</html>
